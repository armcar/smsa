<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SMSA Admin - Offline</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f5f9;
      color: #0f172a;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 520px;
      background: #fff;
      border: 1px solid #cbd5e1;

      padding: 24px;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.08);
    }
    h1 { margin: 0 0 10px; font-size: 24px; }
    p { margin: 0 0 8px; line-height: 1.5; color: #334155; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sem ligacao</h1>
    <p>O painel SMSA esta em modo offline neste momento.</p>
    <p>Assim que a internet voltar, atualize a pagina para continuar.</p>
  </div>
</body>
</html>
